<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع مياه جمعان — استعلام الفواتير</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== الرأس ===== -->
    <header class="site-header">
        <div class="container">
            <h1>💧 مشروع مياه جمعان</h1>
            <p>استعلم عن فاتورتك بسهولة</p>
        </div>
    </header>

    <!-- ===== قسم البحث ===== -->
    <main class="container">
        <section class="search-section">
            <div class="search-card">
                <h2>🔍 الاستعلام عن الفاتورة</h2>
                <p>أدخل رقم حسابك للاطلاع على بياناتك وفاتورتك الأخيرة</p>

                <div class="search-box">
                    <input 
                        type="text" 
                        id="accountInput"
                        placeholder="أدخل رقم الحساب..."
                        maxlength="20"
                    >
                    <button id="searchBtn" onclick="searchAccount()">
                        بحث
                    </button>
                </div>

                <!-- رسالة الخطأ -->
                <div id="errorMsg" class="error-msg hidden">
                    ⚠️ <span id="errorText"></span>
                </div>
            </div>
        </section>

        <!-- ===== قسم النتائج (مخفي في البداية) ===== -->
        <section id="resultsSection" class="hidden">

            <!-- بيانات المشترك -->
            <div class="result-card">
                <h3>👤 بيانات المشترك</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">رقم الحساب</span>
                        <span class="value" id="resAccountNum">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">اسم المشترك</span>
                        <span class="value" id="resName">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">الرصيد الحالي</span>
                        <span class="value" id="resBalance">—</span>
                    </div>
                </div>
            </div>

            <!-- بيانات الفاتورة -->
            <div class="result-card">
                <h3>📄 الفاتورة الأخيرة</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">شهر الفاتورة</span>
                        <span class="value" id="resBillMonth">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">الاستهلاك (م³)</span>
                        <span class="value" id="resConsumption">—</span>
                    </div>
                    <div class="info-item">
                        <span class="label">صافي الفاتورة</span>
                        <span class="value highlight" id="resTotal">—</span>
                    </div>
                </div>
            </div>

        </section>

        <!-- ===== Loading Spinner ===== -->
        <div id="loadingSpinner" class="hidden">
            <div class="spinner"></div>
            <p>جاري البحث...</p>
        </div>

    </main>

    <!-- ===== التذييل ===== -->
    <footer class="site-footer">
        <div class="container">
            <p>مشروع مياه جمعان &copy; 2025</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
